// ── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('board');
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ── Load images ─────────────────────────────────────────────────────────────
const IMGS = {};
let imgsLoaded = 0, imgsTotal = Object.keys(B64).length;
for (const [key, b64] of Object.entries(B64)) {
  const img = new Image();
  img.onload = () => { imgsLoaded++; if (imgsLoaded === imgsTotal) startGame(); };
  img.onerror = () => { imgsLoaded++; if (imgsLoaded === imgsTotal) startGame(); };
  img.src = 'data:image/jpeg;base64,' + b64;
  IMGS[key] = img;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function collide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function dirVel(d) {
  const s = TILE / 4;
  return d==='U'?[0,-s]:d==='D'?[0,s]:d==='L'?[-s,0]:[s,0];
}
function inTunnel(e) { return TUNNEL_ROWS.has(Math.floor((e.y + e.h/2) / TILE)); }
function tryTeleport(e) {
  if (!inTunnel(e)) return false;
  if (e.x + e.w <= 0) { e.x = W; return true; }
  if (e.x >= W)       { e.x = -e.w; return true; }
  return false;
}

// ── Entity class ─────────────────────────────────────────────────────────────
class Entity {
  constructor(kind, x, y, colorKey) {
    this.kind = kind; this.x = x; this.y = y; this.w = TILE; this.h = TILE;
    this.sx = x; this.sy = y;
    this.colorKey = colorKey;
    this.dir = 'R'; this.vx = 0; this.vy = 0;
  }
  setDir(d) { [this.vx, this.vy] = dirVel(d); this.dir = d; }
  canMove(d, walls) {
    const [vx, vy] = dirVel(d);
    this.x += vx; this.y += vy;
    const ok = !walls.some(w => collide(this, w));
    this.x -= vx; this.y -= vy;
    return ok;
  }
  trySetDir(d, walls) {
    if (this.canMove(d, walls)) { this.setDir(d); return true; }
    return false;
  }
  reset() { this.x = this.sx; this.y = this.sy; this.vx = 0; this.vy = 0; }
}

// ── Game state ───────────────────────────────────────────────────────────────
let walls, foods, ghosts, cherries, pacman;
let score, lives, gameOver, buffDir;
let animFrame, animCounter;
let inScoreRoom, srWalls, srFoods, srTimer;
const SR_DUR = 10000;

function makeFood(x, y, color) {
  return { x: x+14, y: y+14, w: 4, h: 4, color };
}

function loadMap() {
  walls=[]; foods=[]; ghosts=[]; cherries=[];
  for (let r=0; r<ROW_COUNT; r++) {
    for (let c=0; c<COLUMN_COUNT; c++) {
      const ch = MAZE[r][c], x = c*TILE, y = r*TILE;
      if (ch==='X') walls.push({x,y,w:TILE,h:TILE});
      else if ('rbop'.includes(ch)) { const g=new Entity('ghost',x,y,ch); g.setDir(DIRECTIONS[Math.random()*4|0]); ghosts.push(g); }
      else if (ch==='P') { pacman=new Entity('pacman',x,y); }
      else if (ch===' ') foods.push(makeFood(x,y,'#fff'));
      else if (ch==='C') cherries.push({x,y,w:TILE,h:TILE});
    }
  }
}

function loadScoreRoom() {
  srWalls=[]; srFoods=[];
  const ox=(W - SR_COLS*TILE)>>1, oy=(H - SR_ROWS*TILE)>>1;
  for (let r=0; r<SR_ROWS; r++) {
    for (let c=0; c<SR_COLS; c++) {
      const ch=SCORE_ROOM[r][c], x=ox+c*TILE, y=oy+r*TILE;
      if (ch==='X') srWalls.push({x,y,w:TILE,h:TILE});
      else srFoods.push(makeFood(x,y,'#ffdc64'));
    }
  }
  const cr=SR_ROWS>>1, cc=SR_COLS>>1;
  pacman.x=(ox+cc*TILE); pacman.y=(oy+cr*TILE); pacman.vx=0; pacman.vy=0; buffDir=null;
}

function resetPositions() {
  pacman.reset(); buffDir=null;
  ghosts.forEach(g => { g.reset(); g.setDir(DIRECTIONS[Math.random()*4|0]); });
}

function initGame() {
  score=0; lives=3; gameOver=false; buffDir=null;
  animFrame=0; animCounter=0;
  inScoreRoom=false; srWalls=[]; srFoods=[]; srTimer=0;
  loadMap();
  ghosts.forEach(g => g.setDir(DIRECTIONS[Math.random()*4|0]));
}

// ── Movement ─────────────────────────────────────────────────────────────────
function move(dt) {
  const ws = inScoreRoom ? srWalls : walls;

  if (buffDir && pacman.canMove(buffDir, ws)) {
    pacman.setDir(buffDir); buffDir=null;
  }

  pacman.x += pacman.vx; pacman.y += pacman.vy;

  if (!inScoreRoom) {
    if (!tryTeleport(pacman)) {
      for (const w of walls) {
        if (collide(pacman, w)) { pacman.x -= pacman.vx; pacman.y -= pacman.vy; break; }
      }
    }
  } else {
    for (const w of srWalls) {
      if (collide(pacman, w)) { pacman.x -= pacman.vx; pacman.y -= pacman.vy; break; }
    }
    // score room food
    for (let i=srFoods.length-1; i>=0; i--) {
      if (collide(pacman, srFoods[i])) { srFoods.splice(i,1); score+=10; break; }
    }
    return;
  }

  // Ghost logic
  for (const g of ghosts) {
    if (collide(g, pacman)) {
      lives--;
      if (lives===0) { gameOver=true; return; }
      resetPositions(); return;
    }
    if (g.y===TILE*9 && g.dir!=='U' && g.dir!=='D') g.trySetDir('U', walls);
    g.x += g.vx; g.y += g.vy;
    if (!tryTeleport(g)) {
      if (walls.some(w=>collide(g,w)) || g.x<=0 || g.x+g.w>=W) {
        g.x -= g.vx; g.y -= g.vy;
        g.trySetDir(DIRECTIONS[Math.random()*4|0], walls);
      }
    }
  }

  // Food
  for (let i=foods.length-1; i>=0; i--) {
    if (collide(pacman, foods[i])) { foods.splice(i,1); score+=10; break; }
  }
  if (foods.length===0) { loadMap(); resetPositions(); return; }

  // Cherry
  for (let i=cherries.length-1; i>=0; i--) {
    if (collide(pacman, cherries[i])) {
      cherries.splice(i,1);
      inScoreRoom=true; srTimer=SR_DUR;
      loadScoreRoom(); return;
    }
  }
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function drawImg(key, x, y) {
  if (IMGS[key] && IMGS[key].complete) ctx.drawImage(IMGS[key], x, y, TILE, TILE);
}

function drawFood(f) {
  ctx.fillStyle = f.color;
  ctx.fillRect(f.x, f.y, f.w, f.h);
}

function drawWall(w) {
  if (IMGS.wall && IMGS.wall.complete) {
    ctx.drawImage(IMGS.wall, w.x, w.y, TILE, TILE);
  } else {
    ctx.fillStyle='#0050c8'; ctx.fillRect(w.x,w.y,w.w,w.h);
  }
}

function drawPacman() {
  const mAngle = MOUTH_FRAMES[animFrame];
  const key = 'pacman_' + pacman.dir;
  if (mAngle <= 5) {
    ctx.fillStyle='#ffdc00';
    ctx.beginPath();
    ctx.arc(pacman.x+TILE/2, pacman.y+TILE/2, TILE/2-1, 0, Math.PI*2);
    ctx.fill();
  } else {
    drawImg(key, pacman.x, pacman.y);
  }
}

function drawMainGame() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  walls.forEach(drawWall);
  foods.forEach(drawFood);
  cherries.forEach(ch => {
    if (IMGS.C && IMGS.C.complete) ctx.drawImage(IMGS.C, ch.x, ch.y, TILE, TILE);
    else { ctx.fillStyle='#dc0000'; ctx.beginPath(); ctx.arc(ch.x+TILE/2,ch.y+TILE/2,TILE/2-2,0,Math.PI*2); ctx.fill(); }
  });
  ghosts.forEach(g => drawImg(g.colorKey, g.x, g.y));
  drawPacman();

  ctx.fillStyle='#fff'; ctx.font='bold 16px monospace';
  if (gameOver) {
    ctx.fillText(`GAME OVER! Score: ${score}  — Press arrow key to restart`, TILE/2, TILE/4+12);
  } else {
    ctx.fillText(`Lives: ${lives}   Score: ${score}`, TILE/2, TILE/4+12);
  }
}

function drawScoreRoom() {
  ctx.fillStyle='#000028'; ctx.fillRect(0,0,W,H);
  srWalls.forEach(drawWall);
  srFoods.forEach(drawFood);
  drawPacman();

  const secsLeft = Math.max(0, srTimer/1000);
  const bw = ((secsLeft/10)*(W-40))|0;
  ctx.fillStyle='#3c3c50'; ctx.fillRect(20,8,W-40,14);
  ctx.fillStyle = secsLeft>5 ? '#64ff64' : secsLeft>3 ? '#ffc800' : '#ff3c3c';
  ctx.fillRect(20,8,bw,14);

  ctx.fillStyle='#fff'; ctx.font='bold 16px monospace';
  ctx.fillText(`BONUS ROOM  ${secsLeft.toFixed(1)}s  Score: ${score}`, 20, 38);
  ctx.fillStyle='#ffdc00'; ctx.font='bold 28px monospace';
  const t='SCORE ROOM!', tw=ctx.measureText(t).width;
  ctx.fillText(t, (W-tw)/2, 68);
}

// ── Game loop ────────────────────────────────────────────────────────────────
let last=0, accum=0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - last; last = ts;
  accum += dt;

  while (accum >= FRAME_MS) {
    accum -= FRAME_MS;
    if (!gameOver) {
      animCounter++;
      if (animCounter >= 2) { animCounter=0; animFrame=(animFrame+1)%MOUTH_FRAMES.length; }
      move(FRAME_MS);
      if (inScoreRoom) {
        srTimer -= FRAME_MS;
        if (srTimer <= 0) {
          inScoreRoom=false;
          pacman.x=pacman.sx; pacman.y=pacman.sy; pacman.vx=0; pacman.vy=0;
        }
      }
    }
  }

  if (inScoreRoom) drawScoreRoom(); else drawMainGame();
}

// ── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (gameOver) {
    initGame(); return;
  }
  const map={'ArrowUp':'U','ArrowDown':'D','ArrowLeft':'L','ArrowRight':'R','w':'U','s':'D','a':'L','d':'R'};
  const d = map[e.key];
  if (!d) return;
  e.preventDefault();
  const ws = inScoreRoom ? srWalls : walls;
  if (pacman.canMove(d, ws)) { pacman.setDir(d); buffDir=null; }
  else buffDir = d;
});

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame() {
  initGame();
  requestAnimationFrame(ts => { last=ts; requestAnimationFrame(loop); });
}
</script>
